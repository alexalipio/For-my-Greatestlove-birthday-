        :root { 
            --lavender: #f3e5f5; 
            --soft-purple: #e1bee7; 
            --accent: #ba68c8; 
            --bg-dark: #0a0510; 
            --glow: 0 0 20px rgba(186, 104, 200, 0.7);
            --yellow-glow: 0 0 25px rgba(255, 235, 59, 0.9);
            --polaroid-glow: 0 0 35px rgba(186, 104, 200, 0.9), 0 0 15px rgba(243, 229, 245, 0.5);
            --polaroid-dim: 0 0 10px rgba(0, 0, 0, 0.6);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100%; width: 100%; 
            background: var(--bg-dark); font-family: 'Poppins', sans-serif; 
            color: white; overflow-x: hidden; 
            transition: background 1s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        #film-grain {
            position: fixed; inset: 0; z-index: 9800; pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.06; display: none;
        }

        #fade-overlay {
            position: fixed; inset: 0; background: #0a0510; z-index: 9998;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out;
        }

        #curtain-container { position: fixed; inset: 0; z-index: 10000; display: flex; overflow: hidden; pointer-events: none; }
        .curtain-half { 
            width: 50%; height: 100%; background: #1a1025; 
            transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1); 
            position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); 
            pointer-events: auto;
        }
        .curtain-left { border-right: 2px solid var(--accent); transform: translateX(0); }
        .curtain-right { border-left: 2px solid var(--accent); transform: translateX(0); }
        .curtain-open .curtain-left { transform: translateX(-100%); }
        .curtain-open .curtain-right { transform: translateX(100%); }
        
        #curtain-content { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 10001; 
            text-align: center; width: 100%; 
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }

        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            border: 2px solid var(--soft-purple); 
            box-shadow: var(--glow);
            border-radius: 25px; padding: 30px; 
            width: 85%; max-width: 420px; 
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 2000; 
            opacity: 0; display: none; transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            height: auto; min-height: 200px;
            box-sizing: border-box;
            pointer-events: auto;
        }
        .card.active { opacity: 1; display: block; }

        .parchment-card { 
            background: #f4e4bc; 
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            color: #2b1b17; border: 10px double #8b5a2b; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6); 
            min-height: auto; height: auto !important;
        }

        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        
        .glow-text { text-shadow: var(--glow); }
        .yellow-glow { text-shadow: var(--yellow-glow) !important; }

        #lyrics-container { 
            position: fixed; top: 10%; width: 100%; text-align: center; z-index: 500; pointer-events: none; 
            transition: top 0.5s ease-in-out, opacity 0.5s;
        }
        #lyrics-container.bottom-align {
            top: unset !important; bottom: 8% !important;
        }
        
        #lyrics-text { 
            font-family: 'Dancing Script', cursive; font-size: 2rem; 
            color: #e1bee7; text-shadow: 0 0 15px #ba68c8; 
            padding: 0 20px; display: inline-block; line-height: 1.4;
            transition: opacity 0.4s ease-in-out;
        }

        .flying-envelope-container { 
            position: fixed; top: 120%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10005 !important; display: none; pointer-events: auto;
        }
        
        .envelope-body { 
            width: 120px; height: 80px; 
            background: #e4d5b7; 
            border: 1px solid #c3b091;
            position: relative; cursor: pointer; 
            animation: bobbing 2s ease-in-out infinite; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
            pointer-events: auto;
            border-radius: 0; outline: none; padding: 0;
            display: block; -webkit-appearance: none; appearance: none;
        }
        .envelope-body::before { 
            content: ""; position: absolute; top: 0; left: 0;
            border-top: 45px solid #dcd0b9; border-left: 59px solid transparent; border-right: 59px solid transparent; 
        }
        .envelope-body::after {
            content: "✦"; position: absolute; top: 32px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 22px; background: #800c14; border-radius: 50%;
            color: #ffd700; font-size: 0.7rem; line-height: 22px; text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        .wing { 
            position: absolute; width: 65px; height: 40px; 
            background: #fbf8f3; 
            border: 1px solid #e2d9cc;
            border-radius: 65% 35% 0 50%; 
            top: -12px; z-index: -1; 
            animation: flap 0.38s ease-in-out infinite alternate; 
            box-shadow: inset -5px -2px 10px rgba(0,0,0,0.05);
            pointer-events: none;
        }
        .wing-left { left: -52px; transform-origin: right; }
        .wing-right { right: -52px; transform-origin: left; transform: scaleX(-1); }

        @keyframes flap { from { transform: rotate(12deg); } to { transform: rotate(-28deg); } }
        @keyframes bobbing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

        #particle-canvas { position: fixed; inset: 0; z-index: 10010; pointer-events: none; display: none; }

        .parallax-lyrics {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Dancing Script', cursive; font-size: 2.3rem;
            color: rgba(225, 190, 231, 0.25); text-align: center; width: 85%;
            z-index: 9100; pointer-events: none; white-space: nowrap;
            text-shadow: 0 0 8px rgba(186, 104, 200, 0.3);
        }

        .scatter-photo { 
            position: fixed; 
            width: 100px !important; 
            height: 130px !important; 
            border: 4px solid #ffffff !important; 
            z-index: 9500 !important; 
            opacity: 0; 
            background: #fff; 
            transition: opacity 1.5s ease-in-out, transform 1.5s cubic-bezier(0.25, 1, 0.5, 1); 
            box-shadow: var(--polaroid-glow); 
            overflow: hidden; 
            pointer-events: none; 
            display: block !important;
        }
        .scatter-photo img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }

        #cinema-gallery { 
            display: none; width: 100%; position: relative; z-index: 9200; 
            min-height: 100vh; padding-bottom: 120px; box-sizing: border-box;
        }
        #cinema-list {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin: 0 auto;
        }
        .cinema-item { 
            width: 85%; max-width: 440px; margin: 75px auto; 
            opacity: 0.35; transform: translateY(40px) scale(0.95); transition: 0.8s ease-out; 
            display: flex; justify-content: center;
        }
        .cinema-item.reveal { opacity: 1; transform: translateY(0) scale(1.02); }
        .cinema-item img { 
            width: 100%; height: auto; max-width: 440px;
            border: 11px solid #fff; border-bottom: 55px solid #fff; 
            box-shadow: var(--polaroid-dim);
            transition: box-shadow 0.5s ease-in-out;
            display: block; box-sizing: border-box;
        }
        .cinema-item.reveal img { box-shadow: var(--polaroid-glow); }

        .btn { 
            padding: 13px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; 
            background: linear-gradient(45deg, #ba68c8, #9c27b0); color: white; margin-top: 15px; box-shadow: var(--glow);
            pointer-events: auto;
        }
        .centered-action-btn {
            position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%); 
            z-index: 9999; width: auto; min-width: 180px; text-align: center;
        }
        textarea { width: 100%; padding: 13px; border-radius: 12px; border: 1px solid #ddd; margin-top: 10px; box-sizing: border-box; font-family: 'Poppins'; font-size: 0.95rem; color: #333; }

            const c = document.getElementById('particle-canvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            c.style.display = "block";

            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            for (let i = 0; i < 180; i++) {
                lsmParticles.push({
                    x: startX,
                    y: startY,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    r: Math.random() * 4 + 2,
                    color: Math.random() > 0.5 ? "#e1bee7" : "#ffd700",
                    alpha: 1,
                    life: Math.random() * 40 + 35
                });
            }

            function animateDust() {
                ctx.clearRect(0, 0, c.width, c.height);
                let alive = false;
                lsmParticles.forEach(p => {
                    if (p.life > 0) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vx *= 0.96;
                        p.vy *= 0.96;
                        p.alpha = p.life / 60;
                        p.life--;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                        alive = true;
                    }
                });
                if (alive) {
                    requestAnimationFrame(animateDust);
                } else {
                    c.style.display = "none";
                    showLSM();
                }
            }
            animateDust();
        }

        // FIXED: New High-End 2.5D Realistic Outer Space Rendering System
        function initHighEndSpaceView() {
            const c = document.getElementById('canvas-bg'), ctx = c.getContext('2d'); 
            c.width = window.innerWidth; c.height = window.innerHeight;

            // 1. Static Stars (for depth)
            for(let i=0; i<150; i++) {
                starsArr.push({ x: Math.random() * c.width, y: Math.random() * c.height, r: Math.random() * 1.6, o: Math.random() });
            }

            // 2. High-End 2.5D Space Elements List
            // We use JS-generated texture gradients for realistic look
            for (let i = 0; i < 45; i++) {
                debrisArr.push(createSpaceObject(c));
            }

            // Drawing logic
            function draw() { 
                ctx.clearRect(0, 0, c.width, c.height); 
                
                // Draw Stars
                starsArr.forEach(s => { 
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); 
                    ctx.fillStyle = "#fff"; ctx.globalAlpha = s.o; ctx.fill(); 
                }); 

                // Draw Space Debris/Asteroids/Ships/Station (High End 2.5D)
                debrisArr.forEach(obj => {
                    updateSpaceObject(obj, c);
                    drawRealisticObject(ctx, obj);
                });

                requestAnimationFrame(draw); 
            } 
            draw();

            window.addEventListener('resize', () => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
            });
        }

        // JS texture generation factory for space elements
        function createSpaceObject(canvas) {
            const types = ['asteroid', 'meteor', 'comet', 'satellite', 'debris', 'ship', 'station'];
            const type = types[Math.floor(Math.random() * types.length)];
            const rBase = Math.random();
            
            let obj = {
                type: type,
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vy: 0,
                vx: 0,
                baseR: 0, // Radius or primary size
                angle: Math.random() * Math.PI * 2,
                spin: 0,
                opacity: 0.1 + Math.random() * 0.5,
                color1: '#fff',
                color2: '#fff',
                trail: [] // For meteors/comets
            };

            switch (type) {
                case 'asteroid':
                    obj.baseR = 4 + rBase * 15;
                    obj.color1 = '#5d4037'; obj.color2 = '#3e2723'; // Dark earthy
                    obj.vy = 0.2 + Math.random() * 0.4;
                    obj.spin = (Math.random() - 0.5) * 0.02;
                    break;
                case 'meteor':
                    obj.baseR = 2 + rBase * 3;
                    obj.color1 = '#fff'; obj.color2 = '#ffd700'; // White gold
                    obj.vy = 4 + Math.random() * 5; // Fast
                    obj.vx = -(Math.random() * 1);
                    obj.trailLength = 15;
                    break;
                case 'comet':
                    obj.baseR = 3 + rBase * 5;
                    obj.color1 = '#b3e5fc'; obj.color2 = '#0277bd'; // Glowing Blue
                    obj.vy = 1 + Math.random() * 1.5;
                    obj.vx = -(0.5 + Math.random() * 0.5);
                    obj.trailLength = 40;
                    break;
                case 'satellite':
                    obj.baseR = 10 + rBase * 10;
                    obj.color1 = '#bdc3c7'; obj.color2 = '#2c3e50'; // Metallic/Solar panels
                    obj.vy = 0.1 + Math.random() * 0.2; // Slow steady
                    obj.vx = 0.05 + Math.random() * 0.1;
                    break;
                case 'debris':
                    obj.baseR = 3 + rBase * 6;
                    obj.color1 = '#7f8c8d'; obj.color2 = '#2c3e50'; // Metallic gray
                    obj.vy = 0.5 + Math.random() * 1;
                    obj.spin = (Math.random() - 0.5) * 0.05;
                    break;
                case 'ship':
                    obj.baseR = 8 + rBase * 12;
                    obj.color1 = '#ecf0f1'; obj.color2 = '#c0392b'; // Gray/Red accent
                    obj.vy = 1.5 + Math.random() * 1;
                    obj.vx = 0.2;
                    break;
                case 'station':
                    obj.baseR = 25 + rBase * 25; // Large
                    obj.color1 = '#95a5a6'; obj.color2 = '#34495e'; // Dark metallic complex
                    obj.vy = 0.05 + Math.random() * 0.1; // Slow drift
                    obj.angle = Math.PI / 4; // Tilted perspective
                    break;
            }
            return obj;
        }

        function updateSpaceObject(obj, canvas) {
            obj.y += obj.vy;
            obj.x += obj.vx;
            obj.angle += obj.spin;

            // Tail mechanics for meteors/comets
            if (obj.trailLength) {
                obj.trail.push({x: obj.x, y: obj.y});
                if (obj.trail.length > obj.trailLength) obj.trail.shift();
            }

            // Reset when leaving screen (recycle objects)
            if (obj.y > canvas.height + 50 || obj.x > canvas.width + 50 || obj.x < -100) {
                obj.y = -100;
                obj.x = Math.random() * canvas.width;
                if (obj.trail) obj.trail = [];
            }
        }

        // Complex realistic 2.5D rendering factory on canvas
        function drawRealisticObject(ctx, obj) {
            ctx.globalAlpha = obj.opacity;
            ctx.save();
            ctx.translate(obj.x, obj.y);
            ctx.rotate(obj.angle);

            let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.baseR);
            grad.addColorStop(0, obj.color1);
            grad.addColorStop(1, obj.color2);
            ctx.fillStyle = grad;

            // draw specific high end geometries
            switch (obj.type) {
                case 'asteroid':
                    ctx.beginPath();
                    // Irregular shape creation
                    for(let i=0; i<10; i++){
                        const a = (i/10) * Math.PI * 2;
                        const r = obj.baseR * (0.8 + Math.random() * 0.4);
                        ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                    }
                    ctx.closePath();
                    ctx.fill();
                    // Metallic shadow accent
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();
                    break;
                
                case 'debris':
                    // Geometric random metallic shapes
                    ctx.fillRect(-obj.baseR, -obj.baseR/2, obj.baseR*1.5, obj.baseR);
                    ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(-obj.baseR/2, -obj.baseR/4, obj.baseR/2, obj.baseR/2);
                    break;

                case 'ship':
                    // Cockpit/body/wings
                    ctx.beginPath();
                    ctx.moveTo(0, -obj.baseR*1.5); // Nose
                    ctx.lineTo(obj.baseR/2, obj.baseR); // Right Wing
                    ctx.lineTo(0, obj.baseR/2); // Body
                    ctx.lineTo(-obj.baseR/2, obj.baseR); // Left Wing
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = obj.color2; ctx.fillRect(-obj.baseR/4, -obj.baseR/2, obj.baseR/2, obj.baseR/4); // Cockpit
                    break;

                case 'satellite':
                    // Main body
                    ctx.fillRect(-obj.baseR/4, -obj.baseR/2, obj.baseR/2, obj.baseR);
                    // Solar panels (2.5D perspective gradient)
                    let pGrad = ctx.createLinearGradient(-obj.baseR, 0, obj.baseR, 0);
                    pGrad.addColorStop(0, '#2980b9'); pGrad.addColorStop(0.5, '#fff'); pGrad.addColorStop(1, '#2980b9');
                    ctx.fillStyle = pGrad;
                    ctx.fillRect(-obj.baseR, -obj.baseR/6, obj.baseR*0.7, obj.baseR/3); // Left panel
                    ctx.fillRect(obj.baseR*0.3, -obj.baseR/6, obj.baseR*0.7, obj.baseR/3); // Right panel
                    break;

                case 'station':
                    // Complex modular structure rendering
                    ctx.fillStyle = obj.color1;
                    ctx.fillRect(-obj.baseR/2, -obj.baseR/2, obj.baseR, obj.baseR); // Core
                    ctx.fillStyle = "#fff"; // Windows
                    ctx.fillRect(-obj.baseR/4, -obj.baseR/4, 2, 2); ctx.fillRect(0, -obj.baseR/4, 2, 2); ctx.fillRect(obj.baseR/4, -obj.baseR/4, 2, 2);
                    ctx.fillStyle = obj.color2; 
                    // Spokes/Modules
                    ctx.fillRect(-obj.baseR, -obj.baseR/10, obj.baseR*2, obj.baseR/5);
                    ctx.fillRect(-obj.baseR/10, -obj.baseR, obj.baseR/5, obj.baseR*2);
                    break;

                case 'meteor':
                case 'comet':
                    ctx.restore(); // Restore before drawing tail mechanics
