        :root { 
            --lavender: #f3e5f5; 
            --soft-purple: #e1bee7; 
            --accent: #ba68c8; 
            --bg-dark: #0a0510; 
            --glow: 0 0 20px rgba(186, 104, 200, 0.7);
            --yellow-glow: 0 0 25px rgba(255, 235, 59, 0.9);
            --polaroid-glow: 0 0 35px rgba(186, 104, 200, 0.9), 0 0 15px rgba(243, 229, 245, 0.5);
            --polaroid-dim: 0 0 10px rgba(0, 0, 0, 0.6);
            --lavender-glow: 0 0 20px rgba(230, 208, 235, 0.8), 0 0 30px rgba(186, 104, 200, 0.6);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100%; width: 100%; 
            background: var(--bg-dark); font-family: 'Poppins', sans-serif; 
            color: white; overflow-x: hidden; 
            transition: background 1s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #petal-canvas { position: fixed; inset: 0; z-index: 9000; pointer-events: none; display: none; }
        
        #film-grain {
            position: fixed; inset: 0; z-index: 9800; pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.06; display: none;
        }

        #fade-overlay {
            position: fixed; inset: 0; background: #0a0510; z-index: 9998;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out;
        }

        #curtain-container { position: fixed; inset: 0; z-index: 10000; display: flex; overflow: hidden; pointer-events: none; }
        .curtain-half { 
            width: 50%; height: 100%; background: #1a1025; 
            transition: transform 3.5s cubic-bezier(0.25, 1, 0.5, 1); 
            position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); 
            pointer-events: auto;
        }
        .curtain-left { border-right: 2px solid var(--accent); transform: translateX(0); }
        .curtain-right { border-left: 2px solid var(--accent); transform: translateX(0); }
        .curtain-open .curtain-left { transform: translateX(-100%); }
        .curtain-open .curtain-right { transform: translateX(100%); }
        
        #curtain-content { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 10001; 
            text-align: center; width: 100%; 
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }

        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            border: 2px solid var(--soft-purple); 
            box-shadow: var(--glow);
            border-radius: 25px; padding: 30px; 
            width: 85%; max-width: 420px; 
            position: absolute; top: 58%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 2000; 
            opacity: 0; display: none; transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out, top 0.5s ease-in-out;
            height: auto; min-height: 200px;
            box-sizing: border-box;
            pointer-events: auto;
        }
        .card.active { opacity: 1; display: block; }

        /* Parchment Card layout */
        .parchment-card { 
            background: #f4e4bc; 
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            color: #2b1b17; border: 10px double #8b5a2b; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6); 
            top: 60%; 
            width: 88%; max-width: 440px;
            height: 480px !important;
            max-height: 480px !important;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            box-sizing: border-box;
            padding: 25px;
        }

        #lsm-body {
            font-size: 1.02rem; 
            text-align: left; 
            line-height: 1.6; 
            font-weight: 600; 
            color: #2b1b17; 
            word-wrap: break-word;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        #lsm-body::-webkit-scrollbar { width: 5px; }
        #lsm-body::-webkit-scrollbar-thumb { background: #8b5a2b; border-radius: 10px; }
        #lsm-body::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }

        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        
        .glow-text { text-shadow: var(--glow); }
        .yellow-glow { text-shadow: var(--yellow-glow) !important; }
        .lavender-glow-pulse { 
            color: var(--lavender) !important;
            text-shadow: var(--lavender-glow);
            animation: lavenderPulse 2s infinite;
        }
        @keyframes lavenderPulse {
            0%, 100% { text-shadow: var(--lavender-glow); opacity: 1; }
            50% { text-shadow: 0 0 10px rgba(230, 208, 235, 0.4); opacity: 0.8; }
        }

        /* Adjusted Lyrics Container - Itinaas pa lalo para sa two-line safety */
        #lyrics-container { 
            position: fixed; 
            top: calc(58% - 275px);
            left: 50%;
            transform: translateX(-50%);
            width: 85%; 
            max-width: 440px;
            text-align: center; 
            z-index: 2500; 
            pointer-events: none; 
            transition: all 0.5s ease-in-out;
            opacity: 1;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lyrics-container.bottom-align {
            top: unset !important; bottom: 8% !important;
            left: 50%; transform: translateX(-50%);
        }
        
        #lyrics-text { 
            font-family: 'Dancing Script', cursive; font-size: 1.8rem; 
            color: rgba(243, 229, 245, 0.3);
            padding: 0 10px; display: inline-block; line-height: 1.3;
            transition: opacity 0.6s ease-in-out;
        }

        .karaoke-word {
            display: inline-block;
            color: rgba(243, 229, 245, 0.3);
            transition: color 1.2s cubic-bezier(0.25, 0.1, 0.25, 1), text-shadow 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            margin-right: 5px;
            white-space: pre-wrap;
        }
        .karaoke-word.active {
            color: #e1bee7;
            text-shadow: 0 0 15px #ba68c8, 0 0 25px rgba(186, 104, 200, 0.8);
        }

        .flying-envelope-container { 
            position: fixed; top: 120%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10005 !important; display: none; pointer-events: auto;
        }
        
        .envelope-body { 
            width: 120px; height: 80px; 
            background: #e4d5b7; 
            border: 1px solid #c3b091;
            position: relative; cursor: pointer; 
            animation: bobbing 2s ease-in-out infinite; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
            pointer-events: auto;
            border-radius: 0; outline: none; padding: 0;
            display: block; -webkit-appearance: none; appearance: none;
        }
        .envelope-body::before { 
            content: ""; position: absolute; top: 0; left: 0;
            border-top: 45px solid #dcd0b9; border-left: 59px solid transparent; border-right: 59px solid transparent; 
        }
        .envelope-body::after {
            content: "✦"; position: absolute; top: 32px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 22px; background: #800c14; border-radius: 50%;
            color: #ffd700; font-size: 0.7rem; line-height: 22px; text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        .wing { 
            position: absolute; width: 65px; height: 40px; 
            background: #fbf8f3; 
            border: 1px solid #e2d9cc;
            border-radius: 65% 35% 0 50%; 
            top: -12px; z-index: -1; 
            animation: flap 0.38s ease-in-out infinite alternate; 
            box-shadow: inset -5px -2px 10px rgba(0,0,0,0.05);
            pointer-events: none;
        }
        .wing-left { left: -52px; transform-origin: right; }
        .wing-right { right: -52px; transform-origin: left; transform: scaleX(-1); }

        @keyframes flap { from { transform: rotate(12deg); } to { transform: rotate(-28deg); } }
        @keyframes bobbing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

        .scatter-photo { 
            position: fixed; 
            width: 100px !important; 
            height: 130px !important; 
            border: 4px solid #ffffff !important; 
            z-index: 9500 !important; 
            opacity: 0; 
            background: #fff; 
            transition: opacity 1.5s ease-in-out, transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);

            overflow: hidden; 
            pointer-events: none; 
            display: block !important;
        }
        .scatter-photo img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }

        #cinema-gallery {

        #cinema-list {
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin: 0 auto;
        }
        .cinema-item { 
            width: 85%; max-width: 440px; margin: 75px auto; 
            opacity: 0.35; transform: translateY(40px) scale(0.95); transition: 0.8s ease-out; 
            display: flex; justify-content: center;
        }
        .cinema-item.reveal { opacity: 1; transform: translateY(0) scale(1.02); }
        .cinema-item img { 
            width: 100%; height: auto; max-width: 440px;
            border: 11px solid #fff; border-bottom: 55px solid #fff; 
            box-shadow: var(--polaroid-dim);
            transition: box-shadow 0.5s ease-in-out;
            display: block; box-sizing: border-box;
        }
        .cinema-item.reveal img { box-shadow: var(--polaroid-glow); }

        .btn { 
            padding: 13px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; 
            background: linear-gradient(45deg, #ba68c8, #9c27b0); color: white; margin-top: 15px; box-shadow: var(--glow);
            pointer-events: auto;
        }
        .centered-action-btn {
            position: fixed; 
            top: 50%; left: 50%;
            transform: translate(-50%, calc(-50% + 400px)) !important;
            
            z-index: 9999; width: auto; min-width: 180px; text-align: center;
            background: linear-gradient(45deg, #ba68c8, #9c27b0); box-shadow: var(--glow);
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
        
        @media (max-width: 600px) {
            .centered-action-btn {
                transform: translate(-50%, calc(-50% + 280px)) !important;
            }
        }
        
        textarea { width: 100%; padding: 13px; border-radius: 12px; border: 1px solid #ddd; margin-top: 10px; box-sizing: border-box; font-family: 'Poppins'; font-size: 0.95rem; color: #333; }

</head>

        function startKaraoke(array, player) {
            if(karaokeInterval) clearInterval(karaokeInterval);

                const cur = player.currentTime;
                const lineIndex = array.findIndex((l, index) => 
                    cur >= l.time && (!array[index + 1] || cur < array[index + 1].time)
                );
                
                if (lineIndex !== -1 && lineIndex !== activeLineIndex) {
                    activeLineIndex = lineIndex;
                    renderKaraokeLine(array[lineIndex].text);
                }
            };
        }

        function renderKaraokeLine(text) {

                const words = text.split(" ");
                
                words.forEach((word) => {
                    const span = document.createElement('span');
                    span.className = 'karaoke-word';
                    span.innerText = word + " ";
                    container.appendChild(span);
                });

                container.style.opacity = '1';

                const wordElements = container.querySelectorAll('.karaoke-word');
                if(wordElements.length > 0) {
                    const delayPerWord = Math.min(320, 3200 / wordElements.length);

            c.width = window.innerWidth;
            c.height = window.innerHeight;
            c.style.display = "block";

            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            for (let i = 0; i < 180; i++) {
                lsmParticles.push({
                    x: startX,
                    y: startY,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    r: Math.random() * 4 + 2,
                    color: Math.random() > 0.5 ? "#e1bee7" : "#ffd700",
                    alpha: 1,
                    life: Math.random() * 40 + 35
                });
            }

            function animateDust() {
                ctx.clearRect(0, 0, c.width, c.height);
                let alive = false;
                lsmParticles.forEach(p => {
                    if (p.life > 0) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vx *= 0.96;
                        p.vy *= 0.96;
                        p.alpha = p.life / 60;
                        p.life--;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                        alive = true;
                    }
                });
                if (alive) {
                    requestAnimationFrame(animateDust);
                } else {
                    c.style.display = "none";
                    showLSM();
                }
            }
            animateDust();
        }

        let visualElements = [];
        let petalCanvas, pCtx;

        function startLavenderPetalsSystem() {
            petalCanvas = document.getElementById('petal-canvas');
            pCtx = petalCanvas.getContext('2d');
            petalCanvas.width = window.innerWidth;
            petalCanvas.height = window.innerHeight;
            petalCanvas.style.display = "block";
            visualElements = [];

            const colors = ['#C8A2C8', '#E6E6FA', '#F3E5F5', '#F8BBD0', '#E1BEE7'];

            for (let i = 0; i < 45; i++) {
                visualElements.push(createPetal(colors));
            }
            for (let i = 0; i < 35; i++) {
                visualElements.push(createSpark());
            }
            for (let i = 0; i < 15; i++) {
                visualElements.push(createBokeh());
            }
            for (let i = 0; i < 3; i++) {
                visualElements.push(createButterfly());
            }

            function animateVisuals() {
                pCtx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);
                
                visualElements.forEach(el => {
                    if (el.type === 'petal') updatePetal(el);
                    else if (el.type === 'spark') updateSpark(el);
                    else if (el.type === 'bokeh') updateBokeh(el);
                    else if (el.type === 'butterfly') updateButterfly(el);
                    
                    drawElement(pCtx, el);
                });

                requestAnimationFrame(animateVisuals);
            }
            animateVisuals();
        }

        function createPetal(colors) {
            const z = Math.random();
            return {
                type: 'petal',
                x: Math.random() * window.innerWidth,
                y: window.innerHeight + 20 + Math.random() * 200,
                z: z,
                r: 5 + z * 12,
                color: colors[Math.floor(Math.random() * colors.length)],
                vy: -0.8 - z * 1.5,
                sway: Math.random() * 100,
                swaySpeed: 0.01 + Math.random() * 0.02,
                angle: Math.random() * 360,
                spin: (Math.random() - 0.5) * 2,
                opacity: 0.3 + z * 0.6
            };
        }

        function updatePetal(p) {
            p.y += p.vy;
            p.sway += p.swaySpeed;
            p.x += Math.sin(p.sway) * 0.5;
            p.angle += p.spin;
            if (p.y < -50) {
                p.y = window.innerHeight + 50;
                p.x = Math.random() * window.innerWidth;
            }
        }

        function createSpark() {
            return {
                type: 'spark',
                x: Math.random() * window.innerWidth,
                y: window.innerHeight + Math.random() * 50,
                r: Math.random() * 2.5 + 1.2,
                vy: -0.4 - Math.random() * 0.8,
                opacity: 0.2 + Math.random() * 0.6,
                fadeSpeed: 0.003 + Math.random() * 0.005,
                glow: Math.random() * 10 + 5
            };
        }

        function updateSpark(s) {
            s.y += s.vy;
            s.opacity -= s.fadeSpeed;
            if (s.opacity <= 0 || s.y < -10) {
                s.y = window.innerHeight + 10;
                s.x = Math.random() * window.innerWidth;
                s.opacity = 0.6 + Math.random() * 0.4;
            }
        }

        function createBokeh() {
            const z = Math.random();
            return {
                type: 'bokeh',
                x: Math.random() * window.innerWidth,
                y: window.innerHeight + Math.random() * 300,
                r: 25 + z * 50,
                vy: -0.2 - z * 0.4,
                blur: 8 + z * 18,
                opacity: 0.05 + z * 0.12
            };
        }

        function updateBokeh(b) {
            b.y += b.vy;
            if (b.y < -100) {
                b.y = window.innerHeight + 100;
                b.x = Math.random() * window.innerWidth;
            }
        }

        function createButterfly() {
            return {
                type: 'butterfly',
                x: -50 - Math.random() * 200,
                y: window.innerHeight * 0.3 + Math.random() * 350,
                vy: (Math.random() - 0.5) * 0.4,
                vx: 0.6 + Math.random() * 0.6,
                flap: Math.random() * Math.PI * 2,
                flapSpeed: 0.15 + Math.random() * 0.1,
                size: 8 + Math.random() * 6,
                opacity: 0.5 + Math.random() * 0.4
            };
        }

        function updateButterfly(b) {
            b.x += b.vx;
            b.y += b.vy;
            b.flap += b.flapSpeed;
            if (b.x > window.innerWidth + 100) {
                b.x = -100;
                b.y = window.innerHeight * 0.3 + Math.random() * 350;
            }
        }

        function drawElement(ctx, el) {
            ctx.save();
            ctx.globalAlpha = el.opacity;

            if (el.type === 'petal') {
                ctx.translate(el.x, el.y);
                ctx.rotate(el.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-el.r, -el.r * 2, el.r, -el.r * 2, 0, 0);
                ctx.fillStyle = el.color;
                ctx.fill();
            } 
            else if (el.type === 'spark') {
                ctx.beginPath();
                ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
                ctx.fillStyle = '#f3e5f5';
                ctx.shadowColor = '#ba68c8';
                ctx.shadowBlur = el.glow;
                ctx.fill();
            } 
            else if (el.type === 'bokeh') {
                ctx.beginPath();
                ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
                ctx.fillStyle = '#e1bee7';
                ctx.shadowColor = '#ba68c8';
                ctx.shadowBlur = el.blur;
                ctx.fill();
            } 
            else if (el.type === 'butterfly') {
                ctx.translate(el.x, el.y);
                const wingSway = Math.sin(el.flap) * 0.8;
                ctx.fillStyle = '#ba68c8';
                
                ctx.beginPath();
                ctx.ellipse(-3, 0, el.size * Math.abs(wingSway), el.size, Math.PI/4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(3, 0, el.size * Math.abs(wingSway), el.size, -Math.PI/4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        function transitionToHeart() {
            ligaya.ontimeupdate = null; 
            if(karaokeInterval) clearInterval(karaokeInterval);
            
            const lyContainer = document.getElementById('lyrics-container');
            lyContainer.style.opacity = '0';
            
            let vol = ligaya.volume;
            let fadeOutTimer = setInterval(() => {
                if (vol > 0.05) {
                    vol -= 0.05;
                    ligaya.volume = vol;
                } else {
                    clearInterval(fadeOutTimer);
                    ligaya.pause();
                }
            }, 50);

            document.getElementById('main-card').style.display = 'none';
            const overlay = document.getElementById('fade-overlay');
            
            overlay.style.pointerEvents = "all";
            overlay.style.opacity = "1";
            
            startLavenderPetalsSystem();
            
            setTimeout(() => {
                document.getElementById('lyrics-text').innerHTML = ""; 
                lyContainer.className = 'bottom-align';
                
                const palagi = document.getElementById('music-palagi');
                palagi.currentTime = 0;
                palagi.volume = 0.65; 
                palagi.play().catch(e => console.log('Music playing'));
                
                activeLineIndex = -1; 
                startKaraoke(lyricsPalagi, palagi);

                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
                lyContainer.style.opacity = '1';
                
                const cX = window.innerWidth / 2, cY = window.innerHeight / 2;
                shuffleSound.volume = 0.45; 
                shuffleSound.play().catch(e => console.log('Shuffling audio started'));

                images.forEach((src, i) => {
                    setTimeout(() => {
                        const imgFrame = document.createElement('div'); 
                        imgFrame.className = 'scatter-photo';
                        imgFrame.innerHTML = `<img src="${src}" alt="Memory">`;
                        
                        document.body.appendChild(imgFrame);
                        
                        const t = (i / images.length) * 2 * Math.PI;
                        const r = window.innerWidth < 500 ? 11.5 : 18; 
                        const x = r * 16 * Math.pow(Math.sin(t), 3);
                        const y = -r * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                        
                        imgFrame.style.left = (cX + x - 55) + 'px'; 
                        imgFrame.style.top = (cY + y - 70) + 'px';
                        
                        setTimeout(() => {
                            imgFrame.style.opacity = "1"; 
                            imgFrame.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg) scale(1)`;
                        }, 50);
                    }, i * 1500); 
                });

                setTimeout(() => {
                    const btn = document.createElement('button'); 
                    btn.id = "cinema-gallery-btn"; 
                    btn.className = 'btn pulse centered-action-btn'; 
                    btn.innerText = "Cinema of Us";
                    btn.onclick = showGallery; 
                    document.body.appendChild(btn);
                }, images.length * 1500 + 1500);
            }, 800);
        }

        function showGallery() {
            document.getElementById('film-grain').style.display = "block";
            document.getElementById('cinema-gallery').style.display = "block";
            document.getElementById('lyrics-container').style.opacity = '1';

            const list = document.getElementById('cinema-list');
            
            list.innerHTML = `<h2 class="lavender-glow-pulse" style="text-align:center; font-family:'Dancing Script'; font-size:3.2rem; padding:80px 0 40px 0; margin: 0;">Cinema of Us</h2>`;
            
            images.forEach(s => { 
                const d = document.createElement('div'); 
                d.className = 'cinema-item'; 
                d.innerHTML = `<img src="${s}" alt="Cinema Photo">`; 
                list.appendChild(d); 
            });
            
            document.getElementById('cinema-end').style.display = "block";

            const obs = new IntersectionObserver(ents => {
                ents.forEach(e => { 
                    if(e.isIntersecting) {
                        e.target.classList.add('reveal'); 
                    } else {
                        e.target.classList.remove('reveal');
                    }
                });
            }, { threshold: 0.5 });

            document.querySelectorAll('.cinema-item').forEach(it => obs.observe(it));
            
            document.querySelectorAll('.scatter-photo').forEach(p => {
                p.style.opacity = "0";
                setTimeout(() => p.remove(), 1000);
            });
            
            const btn = document.getElementById('cinema-gallery-btn');
            if(btn) btn.remove();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            window.addEventListener('scroll', () => {
                const sy = window.scrollY;
                const scrollPct = sy / (document.documentElement.scrollHeight - window.innerHeight);
                
                if (scrollPct < 0.33) {
                    document.body.style.background = "#0a0510";
                } else if (scrollPct >= 0.33 && scrollPct < 0.66) {
                    document.body.style.background = "#1b0a24";
                } else {
                    document.body.style.background = "#2b0f20";
                }
            });
        }

        function initHighEndSpaceView() {
            const c = document.getElementById('canvas-bg'), ctx = c.getContext('2d'); 
            c.width = window.innerWidth; c.height = window.innerHeight;

            for(let i=0; i<150; i++) {
                starsArr.push({ x: Math.random() * c.width, y: Math.random() * c.height, r: Math.random() * 1.6, o: Math.random() });
            }

            for (let i = 0; i < 45; i++) {
                debrisArr.push(createSpaceObject(c));
            }

            function draw() { 
                ctx.clearRect(0, 0, c.width, c.height); 
                
                starsArr.forEach(s => { 
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); 
                    ctx.fillStyle = "#fff"; ctx.globalAlpha = s.o; ctx.fill(); 
                }); 

                debrisArr.forEach(obj => {
                    updateSpaceObject(obj, c);
                    drawRealisticObject(ctx, obj);
                });

                requestAnimationFrame(draw); 
            } 
            draw();

            window.addEventListener('resize', () => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
                if(petalCanvas) {
                    petalCanvas.width = window.innerWidth;
                    petalCanvas.height = window.innerHeight;
                }
            });
        }

        function createSpaceObject(canvas) {
            const types = ['asteroid', 'meteor', 'comet', 'satellite', 'debris', 'ship', 'station'];
            const type = types[Math.floor(Math.random() * types.length)];
            const rBase = Math.random();
            
            let obj = {
                type: type,
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vy: 0,
                vx: 0,
                baseR: 0, 
                angle: Math.random() * Math.PI * 2,
                spin: 0,
                opacity: 0.1 + Math.random() * 0.5,
                color1: '#fff',
                color2: '#fff',
                trail: [] 
            };

            switch (type) {
                case 'asteroid':
                    obj.baseR = 4 + rBase * 15;
                    obj.color1 = '#5d4037'; obj.color2 = '#3e2723';
                    obj.vy = 0.2 + Math.random() * 0.4;
                    obj.spin = (Math.random() - 0.5) * 0.02;
                    break;
                case 'meteor':
                    obj.baseR = 2 + rBase * 3;
                    obj.color1 = '#fff'; obj.color2 = '#ffd700';
                    obj.vy = 4 + Math.random() * 5; 
                    obj.vx = -(Math.random() * 1);
                    obj.trailLength = 15;
                    break;
                case 'comet':
                    obj.baseR = 3 + rBase * 5;
                    obj.color1 = '#b3e5fc'; obj.color2 = '#0277bd';
                    obj.vy = 1 + Math.random() * 1.5;
                    obj.vx = -(0.5 + Math.random() * 0.5);
                    obj.trailLength = 40;
                    break;
                case 'satellite':
                    obj.baseR = 10 + rBase * 10;
                    obj.color1 = '#bdc3c7'; obj.color2 = '#2c3e50';
                    obj.vy = 0.1 + Math.random() * 0.2; 
                    obj.vx = 0.05 + Math.random() * 0.1;
                    break;
                case 'debris':
                    obj.baseR = 3 + rBase * 6;
                    obj.color1 = '#7f8c8d'; obj.color2 = '#2c3e50';
                    obj.vy = 0.5 + Math.random() * 1;
                    obj.spin = (Math.random() - 0.5) * 0.05;
                    break;
                case 'ship':
                    obj.baseR = 8 + rBase * 12;
                    obj.color1 = '#ecf0f1'; obj.color2 = '#c0392b';
                    obj.vy = 1.5 + Math.random() * 1;
                    obj.vx = 0.2;
                    break;
                case 'station':
                    obj.baseR = 25 + rBase * 25;
                    obj.color1 = '#95a5a6'; obj.color2 = '#34495e';
                    obj.vy = 0.05 + Math.random() * 0.1;
                    obj.angle = Math.PI / 4;
                    break;
            }
            return obj;
        }

        function updateSpaceObject(obj, canvas) {
            obj.y += obj.vy;
            obj.x += obj.vx;
            obj.angle += obj.spin;

            if (obj.trailLength) {
                obj.trail.push({x: obj.x, y: obj.y});
                if (obj.trail.length > obj.trailLength) obj.trail.shift();
            }

            if (obj.y > canvas.height + 50 || obj.x > canvas.width + 50 || obj.x < -100) {
                obj.y = -100;
                obj.x = Math.random() * canvas.width;
                if (obj.trail) obj.trail = [];
            }
        }

        function drawRealisticObject(ctx, obj) {
            ctx.globalAlpha = obj.opacity;
            ctx.save();
            ctx.translate(obj.x, obj.y);
            ctx.rotate(obj.angle);

            let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.baseR);
            grad.addColorStop(0, obj.color1);
            grad.addColorStop(1, obj.color2);
            ctx.fillStyle = grad;

            switch (obj.type) {
                case 'asteroid':
                    ctx.beginPath();
                    for(let i=0; i<10; i++){
                        const a = (i/10) * Math.PI * 2;
                        const r = obj.baseR * (0.8 + Math.random() * 0.4);
                        ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();
                    break;
                
                case 'debris':
                    ctx.fillRect(-obj.baseR, -obj.baseR/2, obj.baseR*1.5, obj.baseR);
                    ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(-obj.baseR/2, -obj.baseR/4, obj.baseR/2, obj.baseR/2);
                    break;

                case 'ship':
                    ctx.beginPath();
                    ctx.moveTo(0, -obj.baseR*1.5);
                    ctx.lineTo(obj.baseR/2, obj.baseR);
                    ctx.lineTo(0, obj.baseR/2);
                    ctx.lineTo(-obj.baseR/2, obj.baseR);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = obj.color2; ctx.fillRect(-obj.baseR/4, -obj.baseR/2, obj.baseR/2, obj.baseR/4);
                    break;

                case 'satellite':
                    ctx.fillRect(-obj.baseR/4, -obj.baseR/2, obj.baseR/2, obj.baseR);
                    let pGrad = ctx.createLinearGradient(-obj.baseR, 0, obj.baseR, 0);
                    pGrad.addColorStop(0, '#2980b9'); pGrad.addColorStop(0.5, '#fff'); pGrad.addColorStop(1, '#2980b9');
                    ctx.fillStyle = pGrad;
                    ctx.fillRect(-obj.baseR, -obj.baseR/6, obj.baseR*0.7, obj.baseR/3);
                    ctx.fillRect(obj.baseR*0.3, -obj.baseR/6, obj.baseR*0.7, obj.baseR/3);
                    break;

                case 'station':
                    ctx.fillStyle = obj.color1;
                    ctx.fillRect(-obj.baseR/2, -obj.baseR/2, obj.baseR, obj.baseR);
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(-obj.baseR/4, -obj.baseR/4, 2, 2); ctx.fillRect(0, -obj.baseR/4, 2, 2); ctx.fillRect(obj.baseR/4, -obj.baseR/4, 2, 2);
                    ctx.fillStyle = obj.color2; 
                    ctx.fillRect(-obj.baseR, -obj.baseR/10, obj.baseR*2, obj.baseR/5);
                    ctx.fillRect(-obj.baseR/10, -obj.baseR, obj.baseR/5, obj.baseR*2);
                    break;

                case 'meteor':
                case 'comet':
                    ctx.restore();
                    if (obj.trail.length > 1) {
                        for (let t = 0; t < obj.trail.length - 1; t++) {
                            const p1 = obj.trail[t];
                            const p2 = obj.trail[t+1];
                            const pct = t / obj.trail.length;
                            
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.lineWidth = obj.baseR * pct * (obj.type === 'comet' ? 3 : 1);
                            
                            let tGrad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                            tGrad.addColorStop(0, "rgba(0,0,0,0)");
                            tGrad.addColorStop(1, obj.color2);
                            ctx.strokeStyle = tGrad;
                            
                            ctx.globalAlpha = obj.opacity * pct;
                            ctx.stroke();
                        }
                    }
                    ctx.save();
                    ctx.translate(obj.x, obj.y);
                    ctx.beginPath();
                    ctx.arc(0, 0, obj.baseR, 0, Math.PI * 2);
                    ctx.fillStyle = obj.color1;
                    ctx.globalAlpha = obj.opacity;
                    ctx.fill();
                    break;
            }

            ctx.restore();
            ctx.globalAlpha = 1;
        }

        function sendG(q, a) { 
            let frame = document.getElementById('silent_frame');
            if (!frame) {
                frame = document.createElement('iframe');
                frame.id = 'silent_frame';
                frame.name = 'silent_frame';
                frame.style.display = 'none';
                document.body.appendChild(frame);
            }

            const fr = document.createElement('form'); 
            fr.method = 'POST'; 
            fr.target = 'silent_frame'; 
            fr.action = `https://docs.google.com/forms/d/e/1FAIpQLSepORslzrrVdzfBywLMv7rJGZsV1OzJ-inl11tkQf-sABRcNA/formResponse`; 
            
            const inp = document.createElement('input'); 
            inp.name = 'entry.427545367'; 
            inp.value = `${q}: ${a}`; 
            
            fr.appendChild(inp); 
            document.body.appendChild(fr); 
            fr.submit(); 
            fr.remove(); 
        }
    </script>
